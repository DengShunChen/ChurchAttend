<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高榮禮拜堂主日崇拜報到系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- jsQR Library -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                🏛️ 高榮禮拜堂
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link active">報到系統</a>
                <a href="/members" class="nav-link">會友管理</a>
                <a href="/visitors" class="nav-link">訪客管理</a>
                <button id="adminTokenBtn" class="btn btn-secondary btn-sm" type="button">🔑 管理金鑰</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🏛️ 高榮禮拜堂主日崇拜報到系統</h1>
            <p>Church Attendance Management System</p>
        </div>

        <!-- Statistics Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>📅 今日出勤</h3>
                <div class="number" id="todayCount">-</div>
            </div>
            <div class="stat-card">
                <h3>📊 總記錄數</h3>
                <div class="number" id="totalCount">-</div>
            </div>
            <div class="stat-card">
                <h3>🕐 最近更新</h3>
                <div class="number" id="lastUpdate" style="font-size: 1.5em;">-</div>
            </div>
        </div>

        <div class="main-grid">
            <!-- Attendance List -->
            <div class="card">
                <h2>📋 出勤名單</h2>

                <!-- Filters -->
                <div class="filters">
                    <div class="search-box">
                        <input type="text" id="searchName" placeholder="🔍 搜尋姓名..." />
                    </div>
                    <input type="date" id="filterDateFrom" placeholder="開始日期" />
                    <input type="date" id="filterDateTo" placeholder="結束日期" />
                    <button class="btn btn-secondary" onclick="applyFilters()">篩選</button>
                </div>

                <div class="loading" id="loadingIndicator">
                    <div class="spinner"></div>
                    <p>載入中...</p>
                </div>

                <div class="table-container">
                    <table id="attendanceTable">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>姓名</th>
                                <th style="text-align: center;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceBody">
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Check-in Form -->
            <div class="card">
                <h2>✅ 報到</h2>

                <!-- Scanner Section -->
                <button type="button" class="btn scanner-toggle" onclick="toggleScanner()">
                    📷 開啟/關閉 QR Code 掃描器
                </button>

                <div id="scanner-wrapper" class="scanner-wrapper">
                    <video id="scanner-video" playsinline></video>
                    <canvas id="scanner-canvas" style="display:none;"></canvas>
                    <div class="scanner-overlay"></div>
                </div>

                <div class="upload-area" onclick="document.getElementById('qr-file').click()">
                    <p>📁 點擊上傳 QR Code 圖片</p>
                    <input type="file" id="qr-file" class="hidden-input" accept="image/*"
                        onchange="handleQRFile(event)">
                </div>

                <div id="scan-result"
                    style="margin: 15px 0; display: none; text-align: center; padding: 10px; background: #e8f5e9; border-radius: 5px; color: #2e7d32;">
                </div>

                <hr style="margin: 20px 0; border: none; border-top: 1px solid #eee;">

                <form id="attendanceForm">
                    <div class="form-group">
                        <label for="date">日期</label>
                        <input type="date" id="date" name="date" required />
                    </div>
                    <div class="form-group">
                        <label for="name">姓名 (手動輸入)</label>
                        <input type="text" id="name" name="name" placeholder="請輸入您的姓名" required autocomplete="off" />
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        ✓ 確認報到
                    </button>
                </form>

                <div class="button-group">
                    <button class="btn btn-secondary" onclick="refreshPage()">
                        🔄 重新整理
                    </button>
                    <button class="btn btn-secondary" onclick="exportToCSV()">
                        📥 下載 CSV
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Admin Token Modal -->
    <div id="adminTokenModal" class="modal">
        <div class="modal-content" style="max-width: 520px;">
            <div class="modal-header">
                <h2>🔑 管理金鑰</h2>
                <span class="close" id="adminTokenCloseBtn">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="adminTokenInput">ADMIN_TOKEN（只會存於本機瀏覽器 localStorage）</label>
                    <input type="password" id="adminTokenInput" autocomplete="off" placeholder="貼上你的 ADMIN_TOKEN">
                </div>
                <p style="color:#666;font-size:0.9em;line-height:1.5;">
                    需要權限的操作（新增/刪除會友、刪除出勤、更新/刪除訪客）會自動帶上 <code>X-Admin-Token</code>。
                </p>
            </div>
            <div class="modal-footer">
                <button id="adminTokenClearBtn" class="btn btn-danger" type="button">清除</button>
                <button id="adminTokenSaveBtn" class="btn btn-primary" type="button">儲存</button>
            </div>
        </div>
    </div>

    <!-- Shared helpers -->
    <script src="/static/js/common.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/app.js"></script>
    <script>window.AppCommon?.initAdminTokenUI?.();</script>
</body>

</html>
