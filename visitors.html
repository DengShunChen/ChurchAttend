<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訪客管理 - 高榮禮拜堂</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="theme-visitors">
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-brand">
        🏛️ 高榮禮拜堂
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link">報到系統</a>
        <a href="/members" class="nav-link">會友管理</a>
        <a href="/visitors" class="nav-link active">訪客管理</a>
        <button id="adminTokenBtn" class="btn btn-secondary btn-sm" type="button">🔑 管理金鑰</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="header">
      <h1>👋 訪客管理</h1>
      <p>Visitor Management System</p>
    </div>

    <div class="card">
      <div class="filters">
        <div class="search-box">
          <input type="text" id="searchTerm" placeholder="🔍 搜尋姓名、電話..." />
        </div>
        <button class="btn btn-primary" onclick="openCheckinModal()">
          ✅ 訪客簽到
        </button>
      </div>

      <div class="loading" id="loadingIndicator">
        <div class="spinner"></div>
        <p>載入中...</p>
      </div>

      <div class="table-container">
        <table id="visitorsTable">
          <thead>
            <tr>
              <th>姓名</th>
              <th>電話</th>
              <th>如何認識我們</th>
              <th>初次來訪</th>
              <th>次數</th>
            </tr>
          </thead>
          <tbody id="visitorsBody">
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Visitor Check-in Modal -->
  <div id="checkinModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>訪客簽到</h2>
        <span class="close" onclick="closeModal('checkinModal')">&times;</span>
      </div>
      <div class="modal-body">
        <form id="checkinForm">
          <div class="form-group">
            <label for="name">姓名 *</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="phone">電話</label>
            <input type="tel" id="phone" name="phone">
          </div>
          <div class="form-group">
            <label for="how_to_know">如何認識我們</label>
            <select id="how_to_know" name="how_to_know">
              <option value="">請選擇</option>
              <option value="朋友介紹">朋友介紹</option>
              <option value="網路搜尋">網路搜尋</option>
              <option value="路過">路過</option>
              <option value="海報/DM">海報/DM</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="form-group">
            <label for="session">參加堂次</label>
            <select id="session" name="session">
              <option value="morning">早堂 (09:00)</option>
              <option value="noon" selected>午堂 (11:00)</option>
              <option value="evening">晚堂 (19:00)</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('checkinModal')">取消</button>
        <button class="btn btn-primary" onclick="submitCheckin()">簽到</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Admin Token Modal -->
  <div id="adminTokenModal" class="modal">
    <div class="modal-content" style="max-width: 520px;">
      <div class="modal-header">
        <h2>🔑 管理金鑰</h2>
        <span class="close" id="adminTokenCloseBtn">&times;</span>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="adminTokenInput">ADMIN_TOKEN（只會存於本機瀏覽器 localStorage）</label>
          <input type="password" id="adminTokenInput" autocomplete="off" placeholder="貼上你的 ADMIN_TOKEN">
        </div>
        <p style="color:#666;font-size:0.9em;line-height:1.5;">
          需要權限的操作（更新/刪除訪客等）會自動帶上 <code>X-Admin-Token</code>。
        </p>
      </div>
      <div class="modal-footer">
        <button id="adminTokenClearBtn" class="btn btn-danger" type="button">清除</button>
        <button id="adminTokenSaveBtn" class="btn btn-primary" type="button">儲存</button>
      </div>
    </div>
  </div>

  <script src="/static/js/common.js"></script>
  <script src="/static/js/visitors.js"></script>
  <script>window.AppCommon?.initAdminTokenUI?.();</script>
</body>

</html>
